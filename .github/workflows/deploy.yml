name: Deploy

on:
  workflow_dispatch:
    inputs:
      DOCKERFILE_PATH:
        description: 'Path to Dockerfile'
        required: true
        default: 'alpine'
      IMAGE_SIZE:
        description: 'Size of ext2 image'
        required: true
        default: '800M'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU i386
        uses: docker/setup-qemu-action@v3
        with:
          platforms: i386

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        run: |
          mkdir -p dist/
          
          # 1. Create the ext2 disk
          sudo fallocate -l ${{ github.event.inputs.IMAGE_SIZE }} cheerpx_image.ext2
          sudo mkfs.ext2 -r 0 cheerpx_image.ext2
          sudo mkdir /mnt/image/
          sudo mount -o loop -t ext2 cheerpx_image.ext2 /mnt/image/
          
          # 2. Build Docker container & Export Filesystem
          # We use a temporary container to extract files
          docker build . -f ${{ github.event.inputs.DOCKERFILE_PATH }} --platform=i386 --output type=tar,dest=- | tar -xf - -C /mnt/image/ --numeric-owner
          printf "nameserver 1.1.1.1\nnameserver 1.0.0.1" | sudo tee /mnt/image/etc/resolv.conf > /dev/null
          sudo umount /mnt/image/

      - name: Split Image
        run: |
          # Split into 128k chunks with .txt suffix
          mkdir -p dist/chunks
          split cheerpx_image.ext2 dist/chunks/cheerpx_image.ext2.c -a 6 -b 128k -x --additional-suffix=.txt
          stat -c%s cheerpx_image.ext2 > dist/chunks/cheerpx_image.ext2.meta
          
          # Generate index.list for GitHubDevice
          ls -1 dist/chunks/ > index.list

      - name: Extract Image Configuration and Prepare Page
        run: |
          # 1. Extract the block between the tags
          # We remove the "### " prefix and the key name (e.g., "CMD: ") to get just the value
          CONFIG_BLOCK=$(sed -n '/<<<IMAGE CONFIGURATION START>>>/,/<<<IMAGE CONFIGURATION END>>>/p' ${{ github.event.inputs.DOCKERFILE_PATH }})

          EXTRACT_VAL() {
            echo "$CONFIG_BLOCK" | grep "^### $1:" | sed "s/^### $1: //"
          }

          CONF_CMD=$(EXTRACT_VAL "CMD")
          CONF_ENV=$(EXTRACT_VAL "ENV")
          CONF_CWD=$(EXTRACT_VAL "CWD")
          CONF_UID=$(EXTRACT_VAL "UID")
          CONF_GID=$(EXTRACT_VAL "GID")

          # 2. Perform replacements in index.html
          sed -i 's#{{{IMAGE_URL}}}#"chunks/cheerpx_image.ext2"#g' index.html
          sed -i 's#{{{IMAGE_TYPE}}}#"split"#g' index.html
          
          sed -i "s#{{{CMD}}}#$CONF_CMD#g" index.html
          sed -i "s#{{{ENV}}}#$CONF_ENV#g" index.html
          sed -i "s#{{{CWD}}}#$CONF_CWD#g" index.html
          sed -i "s#{{{UID}}}#$CONF_UID#g" index.html
          sed -i "s#{{{GID}}}#$CONF_GID#g" index.html

          # 3. Move to dist
          cp index.html dist/
          cp coi-serviceworker.js dist/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4